<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metabolic Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full glass p-8 rounded-[2rem] shadow-2xl text-center space-y-6">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-blue-600/30">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </div>
        
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">METABOLIC <span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Area Riservata Coach</p>
        </div>

        <form action="/login" method="POST" class="space-y-4 text-left">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Password Squadra</label>
                <input type="password" name="password" required autofocus
                    class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all text-center text-xl tracking-[0.5em]">
            </div>
            
            {% if error %}
            <p class="text-red-400 text-[10px] font-black uppercase text-center bg-red-400/10 py-2 rounded-lg border border-red-400/20">{{ error }}</p>
            {% endif %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black uppercase italic tracking-tighter transition-all shadow-lg shadow-blue-600/20">
                Accedi al Roster
            </button>
        </form>
    </div>
</body>
</html>
